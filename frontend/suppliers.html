<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers - GROCIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-shopping-basket"></i>
                <span>GROCIFY</span>
            </div>
            <nav>
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                    <li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
                    <li><a href="categories.html"><i class="fas fa-tags"></i> Categories</a></li>
                    <li class="active"><a href="suppliers.html"><i class="fas fa-truck"></i> Suppliers</a></li>
                    <li><a href="sales.html"><i class="fas fa-file-invoice-dollar"></i> Sales/Billing</a></li>
                    <li><a href="reports.html"><i class="fas fa-file-alt"></i> Reports</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <p>&copy; 2026 GROCIFY</p>
                <p>DBMS Semester Project</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="page-title">
                    <h1>Supplier Management</h1>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="showModal('supplier-modal')">
                        <i class="fas fa-plus"></i> Add New Supplier
                    </button>
                </div>
            </header>

            <section class="activity-card">
                <div class="card-header">
                    <h2>Verified Suppliers</h2>
                </div>
                <div class="table-container">
                    <table id="suppliers-table">
                        <thead>
                            <tr>
                                <th>Supplier Name</th>
                                <th>Contact Person</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Address</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Supplier Modal -->
    <div id="supplier-modal" class="modal-backdrop">
        <div class="modal">
            <div class="modal-header">
                <h2>Add New Supplier</h2>
                <button class="btn btn-outline btn-sm" onclick="hideModal('supplier-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="supplier-form">
                    <div class="form-group">
                        <label>Supplier Name</label>
                        <input type="text" id="supplier-name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Contact Person</label>
                        <input type="text" id="supplier-contact" class="form-control">
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="text" id="supplier-phone" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="supplier-email" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Physical Address</label>
                        <textarea id="supplier-address" class="form-control" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="hideModal('supplier-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveSupplier()">Save Supplier</button>
            </div>
        </div>
    </div>

    <style>
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    </style>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadSuppliers);

        async function loadSuppliers() {
            try {
                const response = await fetch('/api/suppliers');
                const suppliers = await response.json();
                
                const tableBody = document.querySelector('#suppliers-table tbody');
                tableBody.innerHTML = '';
                
                suppliers.forEach(s => {
                    const row = `
                        <tr>
                            <td><strong>${s.supplier_name}</strong></td>
                            <td>${s.contact_person || 'N/A'}</td>
                            <td>${s.phone}</td>
                            <td>${s.email}</td>
                            <td>${s.address || 'N/A'}</td>
                            <td>
                                <button class="btn btn-sm btn-outline"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (err) {
                console.error('Error loading suppliers:', err);
            }
        }

        async function saveSupplier() {
            const data = {
                supplier_name: document.getElementById('supplier-name').value,
                contact_person: document.getElementById('supplier-contact').value,
                phone: document.getElementById('supplier-phone').value,
                email: document.getElementById('supplier-email').value,
                address: document.getElementById('supplier-address').value
            };

            try {
                const response = await fetch('/api/suppliers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    hideModal('supplier-modal');
                    loadSuppliers();
                    document.getElementById('supplier-form').reset();
                } else {
                    const error = await response.json();
                    alert('Error: ' + error.error);
                }
            } catch (err) {
                console.error('Error saving supplier:', err);
            }
        }
    </script>
</body>
</html>
