<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROCIFY - Grocery Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-shopping-basket"></i>
                <span>GROCIFY</span>
            </div>
            <nav>
                <ul>
                    <li class="active"><a href="Dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                    <li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
                    <li><a href="categories.html"><i class="fas fa-tags"></i> Categories</a></li>
                    <li><a href="suppliers.html"><i class="fas fa-truck"></i> Suppliers</a></li>
                    <li><a href="sales.html"><i class="fas fa-file-invoice-dollar"></i> Sales/Billing</a></li>
                    <li><a href="reports.html"><i class="fas fa-file-alt"></i> Reports</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <p>&copy; 2026 GROCIFY</p>
                <p>DBMS Semester Project</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Nav -->
            <header class="top-nav">
                <div class="page-title">
                    <h1>Dashboard</h1>
                </div>
                <div class="user-profile">
                    <span id="current-date"></span>
                    <div class="user-info">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=1b4d3e&color=f5d76e" alt="User">
                        <span>Admin</span>
                    </div>
                </div>
            </header>

            <!-- Dashboard Stats -->
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-boxes"></i></div>
                    <div class="stat-info">
                        <h3>Total Products</h3>
                        <p id="stat-total-products">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon gold"><i class="fas fa-dollar-sign"></i></div>
                    <div class="stat-info">
                        <h3>Total Sales</h3>
                        <p id="stat-total-sales">$0.00</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="stat-info">
                        <h3>Low Stock Items</h3>
                        <p id="stat-low-stock">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="fas fa-shopping-cart"></i></div>
                    <div class="stat-info">
                        <h3>Recent Sales</h3>
                        <p id="stat-recent-sales-count">0</p>
                    </div>
                </div>
            </section>

            <!-- Charts / Recent Activity -->
            <section class="activity-grid">
                <div class="activity-card">
                    <div class="card-header">
                        <h2>Recent Sales</h2>
                        <a href="sales.html" class="btn btn-sm btn-outline">View All</a>
                    </div>
                    <div class="table-container">
                        <table id="recent-sales-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Date</th>
                                    <th>Staff</th>
                                    <th>Amount</th>
                                    <th>Payment</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Loaded via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="activity-card">
                    <div class="card-header">
                        <h2>System Alerts</h2>
                    </div>
                    <div class="alerts-list" id="alerts-list">
                        <!-- Loaded via JS -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadDashboardStats();
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        });

        async function loadDashboardStats() {
            try {
                const response = await fetch('/api/dashboard/stats');
                const data = await response.json();
                
                document.getElementById('stat-total-products').innerText = data.total_products;
                document.getElementById('stat-total-sales').innerText = '₹' + parseFloat(data.total_sales).toFixed(2);
                document.getElementById('stat-low-stock').innerText = data.low_stock_count;
                document.getElementById('stat-recent-sales-count').innerText = data.recent_sales.length;

                const tableBody = document.querySelector('#recent-sales-table tbody');
                tableBody.innerHTML = '';
                
                data.recent_sales.forEach(sale => {
                    const row = `
                        <tr>
                            <td>#${sale.sale_id}</td>
                            <td>${new Date(sale.sale_date).toLocaleDateString()}</td>
                            <td>${sale.staff_name}</td>
                            <td>₹${parseFloat(sale.total_amount).toFixed(2)}</td>
                            <td><span class="badge ${sale.payment_method}">${sale.payment_method}</span></td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

                const alertsList = document.getElementById('alerts-list');
                alertsList.innerHTML = '';
                if (data.low_stock_count > 0) {
                    alertsList.innerHTML += `
                        <div class="alert alert-warning">
                            <i class="fas fa-exclamation-triangle"></i>
                            <div>
                                <strong>Low Stock Warning</strong>
                                <p>${data.low_stock_count} items are running low on stock. Please restock soon.</p>
                            </div>
                        </div>
                    `;
                } else {
                    alertsList.innerHTML += `
                        <div class="alert alert-info">
                            <i class="fas fa-check-circle"></i>
                            <div>
                                <strong>All Good</strong>
                                <p>Inventory levels are healthy across all categories.</p>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                console.error('Error loading stats:', err);
            }
        }
    </script>
    
</body>
</html>
